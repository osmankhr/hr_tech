# /hr location block for /etc/nginx/sites-available/stagetwoforge — installed 2026-07-04.
# Goes inside the existing `server { ... listen 443 ssl; ... }` block, alongside `location /`.
# Backend serves everything at root; nginx strips the public /hr prefix before proxying,
# so the FastAPI app never needs to know it's mounted under /hr.

location = /hr {
    return 301 /hr/;
}

location /hr/ {
    proxy_pass http://127.0.0.1:8766/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
}
